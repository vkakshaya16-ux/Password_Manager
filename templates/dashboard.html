<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Password Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;

    /* FIXED BACKGROUND */
    background: 
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("https://images.unsplash.com/photo-1555066931-4365d14bab8c");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    height: 100vh;
    margin: 0;

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 720px;
    padding: 30px;

    border-radius: 18px;

    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.2);

    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* HEADINGS */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

h3 {
    margin-top: 25px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    border-radius: 8px;
    border: none;

    background: rgba(255, 255, 255, 0.2);
    color: white;

    outline: none;
}

input::placeholder {
    color: rgba(255,255,255,0.7);
}

/* BUTTON BASE */
button {
    padding: 10px 15px;
    margin-top: 8px;
    margin-right: 5px;

    border: none;
    border-radius: 8px;

    cursor: pointer;
    transition: 0.3s;
    font-weight: 500;
}

/* PRIMARY BUTTON */
button[type="submit"] {
    width: 100%;
    background: #4facfe;
}

button[type="submit"]:hover {
    background: #2e8df7;
}

/* ACTION BUTTONS */
.action-btn {
    background: rgba(255,255,255,0.25);
}

.action-btn:hover {
    background: rgba(255,255,255,0.5);
}

/* DELETE BUTTON */
.delete-btn {
    background: rgba(255, 0, 0, 0.5);
}

.delete-btn:hover {
    background: rgba(255, 0, 0, 0.8);
}

/* PASSWORD CARD */
.password-box {
    margin-top: 20px;
    padding: 15px;

    border-radius: 12px;

    background: rgba(255,255,255,0.15);

    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
}

/* LABELS */
.password-box strong {
    color: #e0e0e0;
}

/* PASSWORD FIELD */
.password-box input {
    margin-top: 8px;
}

/* LOGOUT */
.logout {
    margin-top: 20px;
    text-align: center;
}

.logout a {
    color: #ff6b6b;
    font-weight: bold;
    text-decoration: none;
}

.logout a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

<h2>Password Manager</h2>

<form method="POST">
<input type="text" name="app_name" placeholder="App Name" required>
<input type="text" name="app_username" placeholder="Username" required>
<input type="password" name="app_password" placeholder="Password" required>
<button type="submit">Save Password</button>
</form>

<h3>Saved Passwords</h3>

{% for p in passwords %}

<div class="password-box">

<strong>App:</strong> {{ p.app_name }} <br>
<strong>Username:</strong> {{ p.app_username }} <br>

<input type="password" value="{{ p.app_password }}" id="pass{{ p.id }}" readonly>

<button class="action-btn" onclick="togglePassword('pass{{ p.id }}')">Show</button>
<button class="action-btn" onclick="copyPassword('pass{{ p.id }}')">Copy</button>

<form action="/delete/{{ p.id }}" method="POST" style="display:inline;">
    <button class="delete-btn" type="submit">Delete</button>
</form>

</div>

{% else %}

<p>No passwords saved yet.</p>

{% endfor %}

<div class="logout">
<a href="/logout">Logout</a>
</div>

</div>

<script>

/* MODERN COPY (FIXED) */
function copyPassword(id){
    var text = document.getElementById(id).value;
    navigator.clipboard.writeText(text);
    alert("Password copied!");
}

/* SHOW / HIDE */
function togglePassword(id){
    var x = document.getElementById(id);
    x.type = x.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
