<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Password Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 8px 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}

.password-box {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    background: #f4eeee;
}

.logout {
    margin-top: 15px;
    text-align: center;
}

.logout a {
    color: red;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Password Manager Dashboard</h2>

<form method="POST">
<input type="text" name="app_name" placeholder="App Name" required>
<input type="text" name="app_username" placeholder="Username" required>
<input type="password" name="app_password" placeholder="Password" required>
<button type="submit">Save Password</button>
</form>

<h3>Saved Passwords</h3>

{% for id, app_name, app_username, app_password in passwords %}

<div class="password-box">

<strong>App:</strong> {{ app_name }} <br>
<strong>Username:</strong> {{ app_username }} <br>

<input type="password" value="{{ app_password }}" id="pass{{id}}" readonly>

<button onclick="togglePassword('pass{{id}}')">Show</button>
<button onclick="copyPassword('pass{{id}}')">Copy</button>

<a href="/delete/{{id}}">Delete</a>

</div>

{% else %}

<p>No passwords saved yet.</p>

{% endfor %}

<div class="logout">
<a href="/logout">Logout</a>
</div>

</div>

<script>
function copyPassword(id){
    var copyText = document.getElementById(id);
    copyText.select();
    document.execCommand("copy");
    alert("Password copied!");
}

function togglePassword(id){
    var x = document.getElementById(id);
    if(x.type === "password"){
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
