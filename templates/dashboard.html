<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Password Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: 'Segoe UI', sans-serif;

    /* Background image with overlay */
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("{{ url_for('static', filename='dashboardbackground.jpeg') }}");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    height: 100vh;
    margin: 0;

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
}

/* Main container (glass style) */
.container {
    width: 90%;
    max-width: 700px;
    padding: 25px;

    border-radius: 16px;

    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.2);

    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* Headings */
h2, h3 {
    text-align: center;
    margin-bottom: 15px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    border-radius: 8px;
    border: none;

    background: rgba(255, 255, 255, 0.2);
    color: white;

    outline: none;
}

/* Placeholder */
input::placeholder {
    color: rgba(255,255,255,0.7);
}

/* Buttons */
button {
    padding: 10px 14px;
    margin-top: 8px;
    margin-right: 5px;

    background: rgba(255,255,255,0.3);
    color: white;

    border: none;
    border-radius: 8px;

    cursor: pointer;
    transition: 0.3s;
}

/* Hover */
button:hover {
    background: rgba(255,255,255,0.5);
}

/* Password card */
.password-box {
    margin-top: 20px;
    padding: 15px;

    border-radius: 12px;

    background: rgba(255,255,255,0.15);

    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* Labels */
.password-box strong {
    color: #e0e0e0;
}

/* Delete button */
a button {
    background: rgba(255, 0, 0, 0.4);
}

a button:hover {
    background: rgba(255, 0, 0, 0.7);
}

/* Logout */
.logout {
    margin-top: 20px;
    text-align: center;
}

.logout a {
    color: #ff6b6b;
    font-weight: bold;
    text-decoration: none;
}

.logout a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

<h2>Password Manager Dashboard</h2>

<form method="POST">
<input type="text" name="app_name" placeholder="App Name" required>
<input type="text" name="app_username" placeholder="Username" required>
<input type="password" name="app_password" placeholder="Password" required>
<button type="submit">Save Password</button>
</form>

<h3>Saved Passwords</h3>

{% for item in passwords %}

<div class="password-box">

<strong>App:</strong> {{ item.app_name }} <br>
<strong>Username:</strong> {{ item.app_username }} <br>

<input type="password" value="{{ item.app_password }}" id="pass{{item.id}}" readonly>

<button onclick="togglePassword('pass{{item.id}}')">Show</button>
<button onclick="copyPassword('pass{{item.id}}')">Copy</button>

<a href="/delete/{{item.id}}">
    <button>Delete</button>
</a>

</div>

{% else %}

<p>No passwords saved yet.</p>

{% endfor %}

<div class="logout">
<a href="/logout">Logout</a>
</div>

</div>

<script>
function copyPassword(id){
    var copyText = document.getElementById(id);
    copyText.select();
    document.execCommand("copy");
    alert("Password copied!");
}

function togglePassword(id){
    var x = document.getElementById(id);
    if(x.type === "password"){
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
