<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Password Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: url("{{ url_for('static', filename='dashboardbackground.jpeg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    margin: 0;
    color: #0a0505;
}

.container {
    max-width: 650px;
    margin: auto;
    background: #0b0226;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus {
    border-color: #667eea;
    outline: none;
}

button {
    padding: 10px 14px;
    margin-top: 8px;
    margin-right: 5px;
    background-color: #667eea;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #5a67d8;
}

.password-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    background: #f9f9f9;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.password-box strong {
    color: #555;
}

a {
    text-decoration: none;
}

a button {
    background-color: #e53e3e;
}

a button:hover {
    background-color: #c53030;
}

.logout {
    margin-top: 20px;
    text-align: center;
}

.logout a {
    color: #e53e3e;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Password Manager Dashboard</h2>

<form method="POST">
<input type="text" name="app_name" placeholder="App Name" required>
<input type="text" name="app_username" placeholder="Username" required>
<input type="password" name="app_password" placeholder="Password" required>
<button type="submit">Save Password</button>
</form>

<h3>Saved Passwords</h3>

{% for id, app_name, app_username, app_password in passwords %}

<div class="password-box">

<strong>App:</strong> {{ app_name }} <br>
<strong>Username:</strong> {{ app_username }} <br>

<input type="password" value="{{ app_password }}" id="pass{{id}}" readonly>

<button onclick="togglePassword('pass{{id}}')">Show</button>
<button onclick="copyPassword('pass{{id}}')">Copy</button>

<a href="/delete/{{id}}">
    <button>Delete</button>
</a>

</div>

{% else %}

<p>No passwords saved yet.</p>

{% endfor %}

<div class="logout">
<a href="/logout">Logout</a>
</div>

</div>

<script>
function copyPassword(id){
    var copyText = document.getElementById(id);
    copyText.select();
    document.execCommand("copy");
    alert("Password copied!");
}

function togglePassword(id){
    var x = document.getElementById(id);
    if(x.type === "password"){
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
